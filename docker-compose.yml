services:
  mariadb:
    image: mariadb:11
    container_name: sonote-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: sonote_root_pass
      MARIADB_DATABASE: sonote
      MARIADB_USER: sonote
      MARIADB_PASSWORD: sonote_pass
    volumes:
      - sonote_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./sonet-api
      dockerfile: Dockerfile
    container_name: sonote-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_USER: sonote
      DB_PASSWORD: sonote_pass
      DB_NAME: sonote
      JWT_SECRET: sonote-dev-secret-change-in-production
    depends_on:
      mariadb:
        condition: service_healthy

  web:
    build:
      context: ./sonet-web
      dockerfile: Dockerfile
    container_name: sonote-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sonote_data:
